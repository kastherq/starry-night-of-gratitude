<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>starry night of gratitude</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='0.9em' font-size='90'>⭐</text>
</svg>">

<style>
@import url('https://fonts.googleapis.com/css2?family=Rouge+Script&display=swap');

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
    text-align: center;
}

h1 {
    margin-top: 20px;
    position: relative;
    z-index: 10;
    font-family: "Rouge Script", cursive;
    font-size: 60px;
    font-weight: 400;
    text-shadow:
        0 0 5px rgba(255,255,255,0.8),
        0 0 15px rgba(255,255,255,0.6),
        0 0 30px rgba(173,216,230,0.6),
        0 0 60px rgba(135,206,250,0.4);
}

/* INPUT CONTAINER RESPONSIVE */
.input-container {
    margin: 15px;
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

input {
    padding: 12px 18px;
    width: min(260px, 70vw);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.3);
    outline: none;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    color: white;
    font-size: 14px;
}

input::placeholder {
    color: rgba(255,255,255,0.6);
}

input:focus {
    border: 1px solid rgba(135,206,250,0.8);
    box-shadow:
        0 0 15px rgba(135,206,250,0.6),
        inset 0 0 12px rgba(255,255,255,0.2);
}

.add-btn {
    padding: 10px 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(45deg, gold, orange);
    color: #111;
    box-shadow:
        0 0 10px rgba(255,215,0,0.6),
        0 0 25px rgba(255,165,0,0.4);
    transition: all 0.3s ease;
}

.add-btn:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 20px rgba(255,215,0,1),
        0 0 40px rgba(255,165,0,0.8);
}

.add-btn:active {
    transform: scale(0.95);
}

.delete-btn, .close-btn {
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    color: white;
}

.delete-btn { background: crimson; }
.close-btn { background: gray; }

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* MODAL */
#modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 20;
}

.modal-content {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.modal-buttons {
    display: flex;
    justify-content: space-between;
}

/* Tooltip */
#tooltip {
    position: absolute;
    background: rgba(0,0,0,0.85);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 30;
}
</style>
</head>

<body>

<h1>starry night of gratitude</h1>

<div class="input-container">
    <input type="text" id="gratitudeInput" placeholder="Escribe tu gratitud...">
    <button class="add-btn" onclick="addStar()">⭐</button>
</div>

<canvas id="sky"></canvas>
<div id="tooltip"></div>

<div id="modal">
    <div class="modal-content">
        <p id="modalText"></p>
        <div class="modal-buttons">
            <button class="delete-btn" onclick="deleteStar()">Eliminar</button>
            <button class="close-btn" onclick="closeModal()">Cerrar</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("sky");
const ctx = canvas.getContext("2d");
const modal = document.getElementById("modal");
const modalText = document.getElementById("modalText");
const tooltip = document.getElementById("tooltip");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = JSON.parse(localStorage.getItem("gratitudes")) || [];
let particles = [];
let backgroundStars = [];
let selectedStarIndex = null;

/* AREA PROTEGIDA */
function getTopSafeArea() {
    const inputContainer = document.querySelector(".input-container");
    return inputContainer.offsetTop + inputContainer.offsetHeight + 20;
}

/* FONDO */
function generateBackgroundStars() {
    backgroundStars = [];
    for (let i = 0; i < 250; i++) {
        backgroundStars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5 + 0.3,
            speed: Math.random() * 0.2 + 0.05,
            twinkle: Math.random() * Math.PI * 2
        });
    }
}
generateBackgroundStars();

function drawBackground() {

    // Fondo azul profundo nocturno
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, "#01010f");
    gradient.addColorStop(0.4, "#020111");
    gradient.addColorStop(0.7, "#050520");
    gradient.addColorStop(1, "#000000");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Neblina suave tipo borrador (efecto profundidad)
    const mist = ctx.createRadialGradient(
        canvas.width / 2,
        canvas.height * 0.3,
        0,
        canvas.width / 2,
        canvas.height * 0.3,
        canvas.height
    );

    mist.addColorStop(0, "rgba(30, 60, 120, 0.15)");
    mist.addColorStop(1, "rgba(0, 0, 0, 0)");

    ctx.fillStyle = mist;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Estrellas de fondo
    backgroundStars.forEach(star => {
        star.y += star.speed;
        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }

        star.twinkle += 0.02;
        const opacity = 0.5 + Math.sin(star.twinkle) * 0.5;

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${opacity})`;
        ctx.fill();
    });
}

/* DIBUJO ESTRELLA */
function drawStar(x, y, radius, opacity=1) {
    ctx.save();
    ctx.beginPath();
    ctx.translate(x, y);
    ctx.moveTo(0, -radius);
    for (let i = 0; i < 5; i++) {
        ctx.rotate(Math.PI / 5);
        ctx.lineTo(0, -radius * 0.5);
        ctx.rotate(Math.PI / 5);
        ctx.lineTo(0, -radius);
    }
    ctx.closePath();
    ctx.fillStyle = `rgba(255,255,255,${opacity})`;
    ctx.shadowBlur = 20;
    ctx.shadowColor = "white";
    ctx.fill();
    ctx.restore();
}

/* EXPLOSIÓN */
function createExplosion(x, y) {
    for (let i = 0; i < 20; i++) {
        particles.push({
            x: x,
            y: y,
            dx: (Math.random() - 0.5) * 4,
            dy: (Math.random() - 0.5) * 4,
            life: 30
        });
    }
}

function saveStars() {
    localStorage.setItem("gratitudes", JSON.stringify(stars));
}

function addStar() {
    const input = document.getElementById("gratitudeInput");
    const text = input.value.trim();
    if (!text) return;

    const size = Math.random() * 15 + 10;
    const topSafe = getTopSafeArea();

    stars.push({
        x: Math.random() * (canvas.width - size * 2) + size,
        y: Math.random() * (canvas.height - topSafe - size * 2) + topSafe + size,
        size: size,
        text: text,
        twinkle: Math.random() * Math.PI * 2
    });

    saveStars();
    input.value = "";
}

function isInsideStar(mx, my, star) {
    const dx = mx - star.x;
    const dy = my - star.y;
    return Math.sqrt(dx * dx + dy * dy) < star.size * 1.2;
}

function draw() {
    drawBackground();

    stars.forEach(star => {
        star.twinkle += 0.05;
        const opacity = 0.6 + Math.sin(star.twinkle) * 0.4;
        drawStar(star.x, star.y, star.size, opacity);
    });

    /* PARTICULAS */
    particles.forEach((p, index) => {
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.life / 30})`;
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(draw);
}
draw();

/* EVENTOS */
canvas.addEventListener("mousemove", function(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    let hovering = false;

    stars.forEach(star => {
        if (isInsideStar(mouseX, mouseY, star)) {
            tooltip.innerText = star.text;
            tooltip.style.left = e.clientX + 10 + "px";
            tooltip.style.top = e.clientY + 10 + "px";
            tooltip.style.display = "block";
            hovering = true;
        }
    });

    if (!hovering) tooltip.style.display = "none";
});

canvas.addEventListener("click", function(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    for (let i = stars.length - 1; i >= 0; i--) {
        if (isInsideStar(mouseX, mouseY, stars[i])) {
            selectedStarIndex = i;
            modalText.innerText = stars[i].text;
            modal.style.display = "flex";
            break;
        }
    }
});

function deleteStar() {
    if (selectedStarIndex !== null) {
        const star = stars[selectedStarIndex];
        createExplosion(star.x, star.y);
        stars.splice(selectedStarIndex, 1);
        saveStars();
        closeModal();
    }
}

function closeModal() {
    modal.style.display = "none";
    selectedStarIndex = null;
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    generateBackgroundStars();
});
</script>

</body>
</html>
